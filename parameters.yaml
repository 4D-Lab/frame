Data:
  name: None
  task: Classification
  path_csv: "path/to/csv_file.csv"
  path_joblib: "path/to/joblib_file.joblib"
  path_checkpoint: "path/to/checkpoint.pt"
  trials: 2
  epochs: 10
  model: gat # gcn, gat, attentive
  batch_size: 128
  patience: 5
  loader: default  # "default" or "decompose"
  grad_clip_norm: 1.0
  drop_edge_p: 0.0  # train-time edge drop probability
  mask_feat_p: 0.0  # train-time node feature mask probability
  regression_loss: mse  # mse | huber | smooth_l1
  huber_delta: 1.0  # threshold for Huber / SmoothL1

Tune:
  hidden_channels:
    min: 32
    max: 512
  num_layers:
    min: 1
    max: 3
  heads:
    min: 1
    max: 3
  dropout_rate:
    min: 0.1
    max: 0.6
  pool:
    choices: [mean, add, max]
  warmup_epochs:
    value: 0
  num_timesteps:
    value: 2
  learning_rate:
    min: 1e-4
    max: 5e-3
    log: true
  weight_decay:
    min: 1e-6
    max: 1e-3
    log: true
  beta_1:
    value: 0.9
  beta_2:
    value: 0.999
  eps:
    value: 1e-8
